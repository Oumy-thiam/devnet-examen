<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autres Questions - Application de Révision</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: 600;
        }
        .question-card {
            border-left: 4px solid #667eea;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }
        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .question-meta {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            padding: 10px 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
        .no-questions {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-white">
                <i class="fas fa-question-circle"></i> 
                Autres Questions - {{ subject_info.title }}
            </h1>
            <a href="{{ url_for('dashboard') }}" class="back-btn">
                <i class="fas fa-arrow-left"></i> Retour au tableau de bord
            </a>
        </div>

        <div class="row">
            <!-- Formulaire de question -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-plus-circle"></i> Poser votre question
                    </div>
                    <div class="card-body">
                        <form id="questionForm">
                            <div class="mb-3">
                                <label for="questionText" class="form-label fw-bold">Votre question</label>
                                <textarea class="form-control" id="questionText" rows="4" 
                                          placeholder="Tapez votre question ici..." required></textarea>
                            </div>
                            <input type="hidden" id="subject" value="{{ subject }}">
                            <button type="submit" class="btn btn-submit w-100">
                                <i class="fas fa-paper-plane"></i> Soumettre la question
                            </button>
                        </form>
                        <div id="submitMessage" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <!-- Liste des questions -->
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-comments"></i> Questions des élèves
                    </div>
                    <div class="card-body">
                        <div id="questionsList">
                            <div class="loading">
                                <i class="fas fa-spinner fa-spin"></i> Chargement des questions...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const subject = "{{ subject }}";
        const subjectInfo = JSON.parse('{{ subject_info | tojson | safe }}');

        // Soumettre une question
        document.getElementById('questionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const questionText = document.getElementById('questionText').value;
            const submitMessage = document.getElementById('submitMessage');
            
            try {
                const response = await fetch('/submit_question', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `question_text=${encodeURIComponent(questionText)}&subject=${subject}`
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    submitMessage.innerHTML = `
                        <div class="alert alert-success">
                            <i class="fas fa-check-circle"></i> ${result.message}
                        </div>
                    `;
                    document.getElementById('questionText').value = '';
                    loadQuestions(); // Recharger les questions
                } else {
                    submitMessage.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-circle"></i> ${result.error}
                        </div>
                    `;
                }
            } catch (error) {
                submitMessage.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> Erreur de connexion
                    </div>
                `;
            }
        });

        // Charger les questions
        async function loadQuestions() {
            const questionsList = document.getElementById('questionsList');
            
            try {
                const response = await fetch(`/get_user_questions/${subject}`);
                const result = await response.json();
                
                if (response.ok) {
                    const questions = result.questions;
                    
                    if (questions.length === 0) {
                        questionsList.innerHTML = `
                            <div class="no-questions">
                                <i class="fas fa-inbox fa-3x mb-3"></i>
                                <h5>Aucune question pour le moment</h5>
                                <p>Soyez le premier à poser une question !</p>
                            </div>
                        `;
                    } else {
                        questionsList.innerHTML = questions.map(q => `
                            <div class="question-card card">
                                <div class="card-body">
                                    <h6 class="card-title">${q.question_text}</h6>
                                    <div class="question-meta">
                                        <i class="fas fa-user"></i> ${q.username} • 
                                        <i class="fas fa-clock"></i> ${new Date(q.created_at).toLocaleString('fr-FR')}
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                } else {
                    questionsList.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-circle"></i> Erreur lors du chargement des questions
                        </div>
                    `;
                }
            } catch (error) {
                questionsList.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> Erreur de connexion
                    </div>
                `;
            }
        }

        // Charger les questions au chargement de la page
        loadQuestions();

        // Rafraîchir les questions toutes les 30 secondes
        setInterval(loadQuestions, 30000);
    </script>
</body>
</html>
